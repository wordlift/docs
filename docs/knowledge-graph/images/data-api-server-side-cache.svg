<svg xmlns="http://www.w3.org/2000/svg" width="1120" height="520" viewBox="0 0 1120 520" role="img" aria-labelledby="title desc">
  <title id="title">Data API server-side cache flow</title>
  <desc id="desc">A server-side rendering flow that checks cached structured data, serves fresh or stale data within the page budget, refreshes from the Data API, and updates the cache when the response returns.</desc>
  <defs>
    <style>
      .bg{fill:#f7f9ff}
      .panel{fill:#fff;stroke:#d9e2ff;stroke-width:2}
      .primary{fill:#3452db}
      .primary-soft{fill:#eef2ff;stroke:#3452db;stroke-width:2}
      .success{fill:#eaf8f1;stroke:#22a06b;stroke-width:2}
      .warn{fill:#fff7e6;stroke:#d98600;stroke-width:2}
      .muted{fill:#f3f6fb;stroke:#b9c5df;stroke-width:2}
      .text{font-family:Inter,Arial,sans-serif;fill:#18213a;font-size:18px}
      .small{font-family:Inter,Arial,sans-serif;fill:#4b587c;font-size:15px}
      .label{font-family:Inter,Arial,sans-serif;fill:#3452db;font-weight:700;font-size:14px;letter-spacing:.02em}
      .white{font-family:Inter,Arial,sans-serif;fill:#fff;font-size:18px;font-weight:700}
      .line{fill:none;stroke:#3452db;stroke-width:3;stroke-linecap:round;stroke-linejoin:round}
      .line-muted{fill:none;stroke:#8fa0d8;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;stroke-dasharray:8 8}
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#3452db"/>
    </marker>
    <marker id="arrowMuted" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#8fa0d8"/>
    </marker>
  </defs>
  <rect class="bg" width="1120" height="520" rx="28"/>
  <rect class="panel" x="32" y="34" width="1056" height="452" rx="22"/>
  <text class="label" x="72" y="78">WORDLIFT DATA API</text>
  <text class="text" x="72" y="110" style="font-size:28px;font-weight:700">Server-side cache pattern</text>
  <text class="small" x="72" y="138">Keep structured data available without letting network latency delay the page response.</text>

  <rect class="primary" x="72" y="204" width="150" height="72" rx="14"/>
  <text class="white" x="104" y="235">Page</text>
  <text class="white" x="98" y="258">request</text>

  <rect class="primary-soft" x="282" y="188" width="190" height="104" rx="14"/>
  <text class="text" x="314" y="225" style="font-weight:700">Build cache key</text>
  <text class="small" x="316" y="252">URL + lang +</text>
  <text class="small" x="316" y="274">output version</text>

  <path class="line" marker-end="url(#arrow)" d="M222 240H282"/>

  <rect class="muted" x="532" y="188" width="184" height="104" rx="14"/>
  <text class="text" x="572" y="225" style="font-weight:700">Read cache</text>
  <text class="small" x="568" y="252">Fresh, stale,</text>
  <text class="small" x="568" y="274">or missing</text>

  <path class="line" marker-end="url(#arrow)" d="M472 240H532"/>

  <rect class="success" x="776" y="114" width="216" height="86" rx="14"/>
  <text class="text" x="823" y="150" style="font-weight:700">Fresh hit</text>
  <text class="small" x="818" y="174">Inject JSON-LD</text>

  <path class="line" marker-end="url(#arrow)" d="M716 224C748 190 748 158 776 158"/>

  <rect class="warn" x="776" y="248" width="216" height="104" rx="14"/>
  <text class="text" x="819" y="284" style="font-weight:700">Stale or miss</text>
  <text class="small" x="814" y="310">Serve stale if valid;</text>
  <text class="small" x="814" y="332">otherwise skip injection</text>

  <path class="line" marker-end="url(#arrow)" d="M716 256C748 276 748 300 776 300"/>

  <rect class="primary-soft" x="330" y="366" width="226" height="76" rx="14"/>
  <text class="text" x="363" y="399" style="font-weight:700">Refresh in background</text>
  <text class="small" x="379" y="424">singleflight per key</text>

  <path class="line-muted" marker-end="url(#arrowMuted)" d="M864 352C806 428 660 432 556 414"/>

  <rect class="primary-soft" x="624" y="366" width="178" height="76" rx="14"/>
  <text class="text" x="658" y="399" style="font-weight:700">Data API</text>
  <text class="small" x="664" y="424">timeout budget</text>

  <path class="line-muted" marker-end="url(#arrowMuted)" d="M556 404H624"/>

  <rect class="success" x="870" y="366" width="150" height="76" rx="14"/>
  <text class="text" x="903" y="399" style="font-weight:700">Update</text>
  <text class="small" x="910" y="424">cache</text>

  <path class="line-muted" marker-end="url(#arrowMuted)" d="M802 404H870"/>
  <path class="line-muted" marker-end="url(#arrowMuted)" d="M870 432C724 486 544 486 420 442"/>
</svg>
