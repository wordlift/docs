name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

concurrency:
  group: swa-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Node deps
        run: npm ci

      - name: Clean build output
        run: rm -rf build

      - name: Detect API changes
        id: api_changes
        shell: bash
        run: |
          api_changed=false

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            api_changed=true
          else
            BEFORE="${{ github.event.before }}"
            if [[ -z "$BEFORE" || "$BEFORE" =~ ^0+$ ]]; then
              api_changed=true
            elif git diff --name-only "$BEFORE" "${{ github.sha }}" | grep -q '^api/'; then
              api_changed=true
            fi
          fi

          if [ "$api_changed" = "false" ]; then
            while IFS= read -r id; do
              if [ ! -f "docs/api/$id/sidebar.ts" ] && [ ! -f "docs/api/$id/sidebar.js" ]; then
                api_changed=true
                break
              fi
            done < <(grep -oE 'gen-api-docs [a-zA-Z0-9-]+' .bin/rebuild-api.sh | awk '{print $2}')
          fi

          echo "api_changed=$api_changed" >> "$GITHUB_OUTPUT"

      - name: Rebuild API docs
        if: steps.api_changes.outputs.api_changed == 'true'
        run: ./.bin/rebuild-api.sh

      - name: Build static site
        run: npm run build

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_PEBBLE_0CF31410F }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for Github integrations (i.e. PR comments)
          action: "upload"
          ###### Repository/Build Configurations - These values can be configured to match your app requirements. ######
          # For more information regarding Static Web App workflow configurations, please visit: https://aka.ms/swaworkflowconfig
          app_location: "build" # Prebuilt app artifact directory
          api_location: "" # Api source code path - optional
          skip_app_build: true
          ###### End of Repository/Build Configurations ######

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_HAPPY_PEBBLE_0CF31410F }}
          action: "close"

  run_docsearch:
    needs: ["build_and_deploy_job"]
    runs-on: ubuntu-latest
    name: Run DocSearch
    steps:
      -
        name: Indexing
        run: docker run -e "APPLICATION_ID=${{secrets.APPLICATION_ID}}" -e "API_KEY=${{secrets.API_KEY}}" -e "CONFIG={\"index_name\":\"docs_wordlift_io\",\"start_urls\":[\"https://docs.wordlift.io\"],\"selectors\":{\"lvl0\":{\"selector\":\"article h1, header h1, h1\",\"default_value\":\"\"},\"lvl1\":\"article h2\",\"lvl2\":\"article h3\",\"lvl3\":\"article h4\",\"lvl4\":\"article h5\",\"lvl5\":\"article h6\",\"text\":\"article p\"}}" algolia/docsearch-scraper:v1.16.0
